name: Deploy
 
on:
  push:
    branches:
      - main

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
  SOLVER_TOKEN: ${{ secrets.SOLVER_TOKEN }}
  NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL }}
  BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build server
        run: cd apps/server && bun run build:cf

      - name: Set worker secrets
        working-directory: apps/server
        run: |
          jq -n \
            --arg database_url "$DATABASE_URL" \
            --arg better_auth_secret "$BETTER_AUTH_SECRET" \
            --arg solver_token "$SOLVER_TOKEN" \
            '{DATABASE_URL: $database_url, BETTER_AUTH_SECRET: $better_auth_secret, SOLVER_TOKEN: $solver_token}' \
            | npx wrangler secret bulk

      - name: Deploy server
        working-directory: apps/server
        run: npx wrangler deploy

      - name: Deploy Frontend
        run: bun run deploy:web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
