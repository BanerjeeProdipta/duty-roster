name: Generate Next Month Roster

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  generate-roster:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install ortools==9.11.4210

      - name: Install JS dependencies
        run: bun install

      # SOLVER_URL is intentionally unset here: this job calls generateRoster()
      # in-process with the ortools install above, bypassing solver_service
      # entirely (that HTTP path only exists for the Cloudflare Worker, which
      # can't spawn python3 itself).
      - name: Generate next month's roster
        run: bun run roster:generate-next-month
