name = "duty-roster-server"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
NODE_ENV = "production"
BETTER_AUTH_URL = "https://duty-roster-server.duty-roster.workers.dev/api/auth"
CORS_ORIGIN = "https://duty-roster-8cw.pages.dev"
# Set to the deployed solver_service URL (see services/solver_service/README.md).
# Leaving this unset makes runSolver() fall back to a local python3 spawn, which
# does not work on Cloudflare Workers.
SOLVER_URL = "https://duty-roster-v9yr.onrender.com"
